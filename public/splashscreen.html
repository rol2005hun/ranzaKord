<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading ranzaKord...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 20%;
      object-fit: cover;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      animation: pulse 2s infinite ease-in-out;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff5555, #ff8888);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loader {
      width: 60px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      height: 100%;
      width: 50%;
      background: #ff5555;
      border-radius: 2px;
      animation: loading 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }
    @keyframes loading {
      0% { left: -50%; }
      100% { left: 100%; }
    }
    .window-controls {
      position: fixed;
      top: 0;
      right: 0;
      display: flex;
      height: 40px;
      z-index: 10;
      -webkit-app-region: no-drag;
    }
    .window-controls .btn {
      width: 46px;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #9494c7;
      cursor: default;
      transition: background 0.1s;
    }
    .window-controls .btn:hover {
      background: #121230;
      color: #e8e8ff;
    }
    .window-controls .btn.close:hover {
      background: #e81123;
      color: white;
    }
  </style>
</head>
<body data-tauri-drag-region>
  <div class="window-controls">
    <div class="btn" id="minimize">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M 0 5 h 10" stroke="currentColor" stroke-width="1.5"/></svg>
    </div>
    <div class="btn close" id="close">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M 1 1 l 8 8 M 9 1 l -8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div class="splash-container" data-tauri-drag-region>
    <img src="/logo.webp" alt="ranzaKord" class="logo" data-tauri-drag-region>
    <div class="title" data-tauri-drag-region>ranzaKord</div>
    <div class="loader" data-tauri-drag-region></div>
  </div>

  <script>
    if (window.__TAURI_INTERNALS__) {
      const minimizeBtn = document.getElementById('minimize');
      const closeBtn = document.getElementById('close');

      minimizeBtn.addEventListener('click', () => {
        window.__TAURI_INTERNALS__.invoke('plugin:window|minimize', { label: 'splashscreen' });
      });

      closeBtn.addEventListener('click', () => {
        window.__TAURI_INTERNALS__.invoke('plugin:window|close', { label: 'splashscreen' });
      });
    }
  </script>
</body>
</html>
