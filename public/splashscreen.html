<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading ranzaKord...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 20%;
      object-fit: cover;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      animation: pulse 2s infinite ease-in-out;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff5555, #ff8888);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loader {
      width: 60px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      height: 100%;
      width: 50%;
      background: #ff5555;
      border-radius: 2px;
      animation: loading 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }
    @keyframes loading {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body data-tauri-drag-region>
  <div class="splash-container" data-tauri-drag-region>
    <img src="/logo.webp" alt="ranzaKord" class="logo" data-tauri-drag-region>
    <div class="title" data-tauri-drag-region>ranzaKord</div>
    <div class="loader" data-tauri-drag-region></div>
  </div>
</body>
</html>
